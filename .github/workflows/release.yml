name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # ── CI gates ──────────────────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Source archive ─────────────────────────────────────────────────────────
  source:
    needs: [ci]
    uses: juanjosegarciaripoll/jj-release/.github/workflows/source.yml@main
    with:
      ref: ${{ github.ref }}

  # ── Windows relocatable binary ────────────────────────────────────────────
  relocatable-windows:
    needs: [ci]
    uses: juanjosegarciaripoll/jj-release/.github/workflows/relocatable.yml@main
    with:
      ref: ${{ github.ref }}
      os: windows-latest

  # ── Windows installer ─────────────────────────────────────────────────────
  installer:
    needs: [relocatable-windows]
    uses: juanjosegarciaripoll/jj-release/.github/workflows/installer.yml@main
    with:
      ref: ${{ github.ref }}

  # ── GitHub release ────────────────────────────────────────────────────────
  release:
    needs: [source, relocatable-windows, installer]
    uses: juanjosegarciaripoll/jj-release/.github/workflows/release.yml@main
    with:
      ref: ${{ github.ref }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
