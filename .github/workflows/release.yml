name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_date: ${{ steps.meta.outputs.release_date }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive and validate version
      id: meta
      shell: bash
      run: |
        set -euo pipefail
        tag="${GITHUB_REF_NAME}"
        if [[ ! "$tag" =~ ^v[0-9.]+$ ]]; then
          echo "Tag '$tag' does not match required pattern v[0-9.]*" >&2
          exit 1
        fi
        version="${tag#v}"
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
          echo "Version '$version' is not a valid semantic version core." >&2
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "release_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build release notes from changelog
      shell: bash
      env:
        VERSION: ${{ steps.meta.outputs.version }}
        RELEASE_DATE: ${{ steps.meta.outputs.release_date }}
      run: |
        set -euo pipefail
        changelog="CHANGELOG.md"
        if [[ ! -f "$changelog" ]]; then
          changelog="CHANGES.md"
        fi
        if [[ ! -f "$changelog" ]]; then
          echo "Neither CHANGELOG.md nor CHANGES.md found." >&2
          exit 1
        fi

        python - <<'PY'
        from __future__ import annotations

        from pathlib import Path
        import os
        import re

        version = os.environ["VERSION"]
        release_date = os.environ["RELEASE_DATE"]

        changelog_path = Path("CHANGELOG.md")
        if not changelog_path.exists():
          changelog_path = Path("CHANGES.md")

        text = changelog_path.read_text(encoding="utf-8")
        match = re.search(r"(?ms)^##\s+Unreleased\s*$\n(.*?)(?=^##\s|\Z)", text)
        if match is None:
          notes = "- No changelog entries were found under `Unreleased`."
        else:
          body = match.group(1).strip()
          notes = body if body else "- No changelog entries were found under `Unreleased`."

        heading = f"## v{version} - {release_date}"
        output = f"{heading}\n\n{notes}\n"
        Path("release-notes.md").write_text(output, encoding="utf-8")
        PY

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  test:
    name: Quality gates / ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Set release version in pyproject.toml
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path
          import re

          version = os.environ["VERSION"]
          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          text = re.sub(
              r'(?m)^version\s*=\s*"[^\"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          pyproject.write_text(text, encoding="utf-8")
          PY

      - name: Install dev dependencies
        run: uv sync --all-extras --dev

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff lint
        run: uv run ruff check .

      - name: basedpyright
        run: uv run basedpyright

      - name: mypy
        run: uv run mypy .

      - name: pytest
        run: uv run pytest -q

  build:
    name: Build artifacts / ${{ matrix.target }}
    needs: [prepare, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: source
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Set release version in pyproject.toml
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path
          import re

          version = os.environ["VERSION"]
          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          text = re.sub(
              r'(?m)^version\s*=\s*"[^\"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          pyproject.write_text(text, encoding="utf-8")
          PY

      - name: Install dev dependencies
        run: uv sync --all-extras --dev

      - name: Build standalone binary
        if: matrix.target != 'source'
        run: uv run python tools/release.py

      - name: Build source tarball
        if: matrix.target == 'source'
        run: uv build --sdist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: |
            dist/latexmk-*
            dist/SHA256SUMS.txt
            dist/*.tar.gz
            dist/*.yaml

  release:
    name: Publish GitHub release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body_path: release-notes/release-notes.md
          files: |
            release-assets/*
